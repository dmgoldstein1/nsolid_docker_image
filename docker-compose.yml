# Generated by Copilot (GPT-5.3-Codex): Local high-security N|Solid sandbox stack for untrusted JavaScript analysis.
services:
  app:
    build:
      context: ./sandbox/app
    container_name: nsolid-sandbox-app
    environment:
      NSOLID_APP: nsolid-sandbox-app
      NSOLID_OTLP: otlp
      NSOLID_TRACING_ENABLED: "true"
      NSOLID_BLOCKED_LOOP_THRESHOLD: "250"
      OTEL_SERVICE_NAME: nsolid-sandbox-app
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_EXPORTER_OTLP_PROTOCOL: grpc
      SANDBOX_SCRIPT: /opt/sandbox/app/untrusted.js
      SANDBOX_EXAMPLE: suspicious_miner
      SANDBOX_ALLOW_FS_READ: /opt/sandbox/app
      SANDBOX_ALLOW_FS_WRITE: /tmp
    volumes:
      - ./sandbox/app:/opt/sandbox/app:ro
      - app-artifacts:/opt/sandbox/artifacts
    read_only: true
    tmpfs:
      - /tmp:size=64m
      - /run:size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    networks:
      - sandbox
    depends_on:
      - otel-collector

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: nsolid-sandbox-otel
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./sandbox/otel/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8889:8889"
    networks:
      - sandbox
    depends_on:
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nsolid-sandbox-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4319:4317"
    networks:
      - sandbox

  prometheus:
    image: prom/prometheus:latest
    container_name: nsolid-sandbox-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./sandbox/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - sandbox
    depends_on:
      - otel-collector

  analyzer:
    build:
      context: ./sandbox/analyzer
      args:
        SOCKET_API_KEY: ""
    container_name: nsolid-sandbox-analyzer
    environment:
      PORT: "8080"
      TARGET_CONTAINER: nsolid-sandbox-app
      JAEGER_URL: http://jaeger:16686
      PROMETHEUS_URL: http://prometheus:9090
      POLL_INTERVAL_MS: "5000"
      CPU_ALERT_THRESHOLD: "80"
      CPU_ALERT_CONSECUTIVE_POLLS: "3"
      HIGH_NET_TX_BYTES_PER_SEC: "250000"
      AUTO_PAUSE_ON_ALERT: "true"
      RULES_FILE: /app/config/rules.json
      ALERTS_FILE: /app/data/alerts.json
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./sandbox/analyzer/config:/app/config
      - ./sandbox/analyzer/data:/app/data
    ports:
      - "8080:8080"
    networks:
      - sandbox
    depends_on:
      - app
      - jaeger
      - prometheus

volumes:
  prometheus-data:
  app-artifacts:

networks:
  sandbox:
    name: nsolid-sandbox-net
